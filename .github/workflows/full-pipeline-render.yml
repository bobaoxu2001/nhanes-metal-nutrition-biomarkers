name: Full Pipeline Render

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R 4.3
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up TinyTeX
        uses: r-lib/actions/setup-tinytex@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::tidyverse
            any::here
            any::janitor
            any::haven
            any::curl
            any::survey
            any::srvyr
            any::broom
            any::broom.helpers
            any::gtsummary
            any::gt
            any::flextable
            any::patchwork
            any::scales
            any::viridis
            any::ggpubr
            any::ggdist
            any::ggrepel
            any::RColorBrewer
            any::glue
            any::fs
            any::knitr
            any::kableExtra
            any::sessioninfo
            any::rmarkdown
            any::quarto
            any::lubridate

      - name: Verify R packages
        run: |
          Rscript -e 'pkgs <- c("tidyverse","here","janitor","haven","survey","srvyr","broom","gtsummary","gt","flextable","patchwork","scales","viridis","glue","fs","knitr","kableExtra","sessioninfo","rmarkdown"); missing <- pkgs[!vapply(pkgs, requireNamespace, logical(1), quietly = TRUE)]; if (length(missing)) stop("Missing packages: ", paste(missing, collapse = ", ")); cat("All required packages available.\n")'

      - name: Run full pipeline
        run: |
          Rscript run_all.R

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nhanes-report
          path: |
            report/nhanes_metal_nutrition_biomarkers.html
            report/nhanes_metal_nutrition_biomarkers.pdf

      - name: Upload figure artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nhanes-figures
          path: outputs/figures/

      - name: Upload table artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nhanes-tables
          path: outputs/tables/
